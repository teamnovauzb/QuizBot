<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5DE5A8"/>
      <stop offset="100%" stop-color="#2FB778"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <rect width="80" height="80" rx="20" fill="url(#hl)"/>
  <!-- Stethoscope tubing -->
  <path
    d="M22 20 V32 a10 10 0 0 0 20 0 V20"
    stroke="#0A1814" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Earpieces -->
  <circle cx="22" cy="20" r="2.5" fill="#0A1814"/>
  <circle cx="42" cy="20" r="2.5" fill="#0A1814"/>
  <!-- Connector cable -->
  <path
    d="M32 42 V52 a8 8 0 0 0 8 8 H46"
    stroke="#0A1814" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Chest piece -->
  <circle cx="52" cy="60" r="7" fill="#0A1814"/>
  <circle cx="52" cy="60" r="3.5" fill="#5DE5A8"/>
  <!-- Heart pulse line accent -->
  <path
    d="M14 56 H22 L26 50 L30 62 L34 56 H42"
    stroke="#0A1814" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55"/>
</svg>
